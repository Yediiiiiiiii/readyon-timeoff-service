name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        env:
          DISABLE_SCHEDULER: '1'
        run: npm run test:cov

      - name: Upload coverage report
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14

      - name: Coverage summary in job log
        if: matrix.node == '22'
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (k) => \`| \${k} | \${s[k].pct}% (\${s[k].covered}/\${s[k].total}) |\`;
              console.log('| Metric | Value |');
              console.log('|---|---|');
              ['lines','statements','functions','branches'].forEach(k => console.log(fmt(k)));
            " >> $GITHUB_STEP_SUMMARY
          else
            echo '_(coverage-summary.json not generated; ensure json-summary reporter is enabled)_' >> $GITHUB_STEP_SUMMARY
          fi
